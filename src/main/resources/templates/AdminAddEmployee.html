<!DOCTYPE html>
<html xmlns:th = "https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>EmployeeHub - Add Employee</title>
</head>
<body>

	<h1>Add Employee</h1>
	<hr>
	<form th:action="@{/admin/employee/add}" th:object = "${employee}" method = "post">
	
		<p th:text = "${error}" style = "color:red"></p>
		
		<label>Firstname</label>
		<input type = "text" th:field = "*{firstname}" placeholder = "Enter firstname"> 
		<p th:if = "${#fields.hasErrors('firstname')}" th:errors = "*{firstname}" style = "color:red"></p>
		<br><br>
		<label>Lastname</label>
		<input type = "text" th:field = "*{lastname}" placeholder = "Enter lastname"> 
		<p th:if = "${#fields.hasErrors('lastname')}" th:errors = "*{lastname}" style = "color:red"></p>
		<br><br>
		<label>Email</label>
		<input type = "email" th:field = "*{email}" placeholder = "Enter email"> 
		<p th:if = "${#fields.hasErrors('email')}" th:errors = "*{email}" style = "color:red"></p>
		<br><br>
		<label>Password</label>
		<input type = "password" th:field = "*{password}" placeholder = "Enter password"> 
		<p th:if = "${#fields.hasErrors('password')}" th:errors = "*{password}" style = "color:red"></p>
		<br><br>
		<label>Address</label>
		<input type = "text" th:field = "*{address}" placeholder = "Enter address"> 
		<p th:if = "${#fields.hasErrors('address')}" th:errors = "*{address}" style = "color:red"></p>
		<br><br>
		<label>PhoneNumber</label>
		<input type = "number" th:field = "*{phoneNumber}" placeholder = "Enter phone number"> 
		<p th:if = "${#fields.hasErrors('phoneNumber')}" th:errors = "*{phoneNumber}" style = "color:red"></p>
		<br><br>
		<label>JoinedDate</label>
		<input type = "date" th:field = "*{joinedDate}" placeholder = "Enter joined date"> 
		<p th:if = "${#fields.hasErrors('joinedDate')}" th:errors = "*{joinedDate}" style = "color:red"></p>
		<br><br>
		<label>Role</label>
		<select th:field = "*{role}">
			<option value = "">--Select Role--</option>
			<option th:each = "r : ${roles}"
					th:value = "${r}"
					th:text = "${r.displayName}">
			</option>
		</select>
		<p th:if = "${#fields.hasErrors('role')}" th:errors = "*{role}" style = "color:red"></p>
		<br><br>
		<button type = "submit">Add</button>
	</form>
</body>
</html>
